<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom | Elegant Celebration</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.3);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #5d4037;
            --accent-pink: #ff85a2;
            --accent-peach: #ffb38a;
            --accent-lavender: #d4a5ff;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #ffe4e1;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
        }

        .mesh-bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(at 0% 0%, #ffc0cb 0, transparent 50%), 
                radial-gradient(at 50% 0%, #fff0f5 0, transparent 50%), 
                radial-gradient(at 100% 0%, #e6e6fa 0, transparent 50%),
                radial-gradient(at 0% 100%, #ffe4e1 0, transparent 50%),
                radial-gradient(at 100% 100%, #ffcad4 0, transparent 50%);
            background-size: 200% 200%;
            animation: meshMove 15s ease infinite;
            z-index: -1;
        }

        @keyframes meshMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #canvas-layer {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        main {
            position: relative;
            z-index: 10;
            perspective: 1500px;
        }

        .card {
            width: 340px;
            height: 480px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s var(--ease-out-expo);
            cursor: pointer;
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(255, 182, 193, 0.3);
        }

        .card-back {
            background: rgba(255, 255, 255, 0.5);
            transform: rotateY(180deg);
            color: var(--text-main);
        }

        h1 { font-size: 2.4rem; color: var(--text-main); margin-bottom: 1rem; font-style: italic; }
        p { color: var(--text-main); line-height: 1.6; font-size: 1.2rem; opacity: 0.8; }

        .celebrate-btn {
            margin-top: 35px;
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-peach));
            color: white;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(255, 133, 162, 0.4);
        }

        .celebrate-btn:hover { transform: scale(1.1); box-shadow: 0 15px 30px rgba(255, 133, 162, 0.5); }
        .celebrate-btn:active { transform: scale(0.95); }

        .instruction {
            margin-top: 2rem;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-main);
            opacity: 0.5;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

        #audio-gate {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--accent-pink);
        }
    </style>
</head>
<body>

    <div id="audio-gate">
        <div style="font-size: 3rem; margin-bottom: 20px;">🌸</div>
        <span>TAP TO START</span>
    </div>

    <div class="mesh-bg"></div>
    <canvas id="canvas-layer"></canvas>

    <main>
        <div class="card" id="mainCard">
            <section class="card-face card-front">
                <div style="font-size: 4.5rem; margin-bottom: 1rem;">✨</div>
                <h1>Bloom</h1>
                <p>A beautiful moment awaits.</p>
                <div class="instruction">Tap to Show</div>
            </section>

            <section class="card-face card-back">
                <h1 style="color: var(--accent-pink);">Happy Birthday! Trisha May</h1>
                <p>More birthdays to come, good health, and may God Bless you always.</p>
                <button class="celebrate-btn" id="celebrateBtn">CELEBRATE!</button>
            </section>
        </div>
    </main>

    <script>
        /**
         * RECALIBRATED MUSIC BOX ENGINE
         * Uses correct rhythmic phrasing (short-short-long) 
         * and a standard medium tempo.
         */
        class MusicBox {
            constructor() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                // Frequencies for Happy Birthday
                // d = duration of note in seconds
                this.melody = [
                    {f: 261.63, d: 0.4}, {f: 261.63, d: 0.2}, {f: 293.66, d: 0.6}, {f: 261.63, d: 0.6}, {f: 349.23, d: 0.6}, {f: 329.63, d: 0.9}, // Happy Birthday to you
                    {f: 261.63, d: 0.4}, {f: 261.63, d: 0.2}, {f: 293.66, d: 0.6}, {f: 261.63, d: 0.6}, {f: 392.00, d: 0.6}, {f: 349.23, d: 1.0}  // Happy Birthday to you
                ];
                this.index = 0;
            }

            async resume() { if (this.ctx.state === 'suspended') await this.ctx.resume(); }

            playNote() {
                const note = this.melody[this.index];
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(note.f, this.ctx.currentTime);
                
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, this.ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + note.d);

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + note.d);

                this.index = (this.index + 1) % this.melody.length;
                
                // The "Medium Velocity" timing: 
                // We wait for the note duration + a small gap (0.1s) to create rhythmic space
                setTimeout(() => this.playNote(), note.d * 1000 + 100);
            }

            start() { this.playNote(); }
        }

        /**
         * PHYSICS ENGINE
         */
        class Particle {
            constructor(x, y, color, type) {
                this.x = x; this.y = y; this.color = color; this.type = type;
                this.life = 1.0;
                this.decay = type === 'firework' ? 0.02 : 0.01;
                
                if (type === 'firework') {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 10 + 5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.friction = 0.95;
                    this.gravity = 0.2;
                } else if (type === 'confetti') {
                    this.vx = (Math.random() - 0.5) * 8;
                    this.vy = Math.random() * 4 + 2;
                    this.friction = 0.98;
                    this.gravity = 0.15;
                } else if (type === 'balloon') {
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = -(Math.random() * 3 + 2);
                    this.friction = 1;
                    this.gravity = -0.03; 
                }
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                if (this.type === 'balloon') {
                    ctx.arc(this.x, this.y, 18, 0, Math.PI * 2);
                } else {
                    ctx.arc(this.x, this.y, this.type === 'firework' ? 2 : 4, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.restore();
            }
        }

        class App {
            constructor() {
                this.canvas = document.getElementById('canvas-layer');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.music = new MusicBox();
                this.card = document.getElementById('mainCard');
                this.btn = document.getElementById('celebrateBtn');
                this.isFlipped = false;
                this.init();
            }

            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.card.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'BUTTON') this.toggleCard();
                });
                this.btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.celebrate();
                });
                document.getElementById('audio-gate').addEventListener('click', async (e) => {
                    await this.music.resume();
                    this.music.start();
                    e.target.style.display = 'none';
                    this.animate();
                });
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            toggleCard() {
                this.isFlipped = !this.isFlipped;
                this.card.classList.toggle('is-flipped');
            }

            celebrate() {
                for(let i=0; i<6; i++) {
                    setTimeout(() => {
                        this.spawn(Math.random() * this.canvas.width, Math.random() * this.canvas.height * 0.5, 'firework', 40);
                    }, i * 400);
                }
                this.spawn(this.canvas.width/2, this.canvas.height/2, 'confetti', 80);
                for(let i=0; i<10; i++) {
                    setTimeout(() => {
                        this.spawn(Math.random() * this.canvas.width, this.canvas.height + 50, 'balloon', 1);
                    }, i * 250);
                }
            }

            spawn(x, y, type, count) {
                const colors = ['#ff85a2', '#ffb38a', '#d4a5ff', '#bde0fe', '#ffffff'];
                for (let i = 0; i < count; i++) {
                    this.particles.push(new Particle(x, y, colors[i % colors.length], type));
                }
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.update();
                    p.draw(this.ctx);
                    if (p.life <= 0 || p.y < -100 || p.y > this.canvas.height + 100) {
                        this.particles.splice(i, 1);
                    }
                }
                requestAnimationFrame(() => this.animate());
            }
        }

        new App();
    </script>
</body>
</html>
